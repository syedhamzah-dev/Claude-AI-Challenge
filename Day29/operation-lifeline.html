<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #080c14;
    --bg-card: #0d1421;
    --bg-card2: #111827;
    --bg-elevated: #161f30;
    --border: #1e2d45;
    --border-glow: #2a4a7f;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-violet: #8b5cf6;
    --accent-orange: #f97316;
    --text-primary: #f0f4ff;
    --text-secondary: #8da4c4;
    --text-muted: #4a6080;
    --font-main: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 40px rgba(59,130,246,0.15);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-main);
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 3px; }

  /* --- Layout --- */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 0 60px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(59,130,246,0.2); }
    50%       { box-shadow: 0 0 40px rgba(59,130,246,0.4); }
  }

  @keyframes bar-fill {
    from { width: 0%; }
  }

  @keyframes countUp {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* --- Cards --- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  }
  .card:hover { border-color: var(--border-glow); box-shadow: var(--shadow-glow); }

  .card-elevated {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
  }

  /* --- Buttons --- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    font-family: var(--font-main);
    font-weight: 600;
    font-size: 15px;
    transition: all var(--transition);
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity var(--transition);
  }
  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: #fff;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
  }
  .btn-primary:hover { box-shadow: 0 4px 30px rgba(37,99,235,0.55); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  .btn-outline {
    background: transparent;
    color: var(--accent-blue);
    border: 1px solid var(--accent-blue);
  }
  .btn-outline:hover { background: rgba(59,130,246,0.12); }

  .btn-success {
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
    box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  }
  .btn-danger {
    background: linear-gradient(135deg, #be123c, #f43f5e);
    color: #fff;
    box-shadow: 0 4px 16px rgba(244,63,94,0.3);
  }

  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* --- Badges --- */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .badge-blue   { background: rgba(59,130,246,0.15);  color: var(--accent-blue);    border: 1px solid rgba(59,130,246,0.3); }
  .badge-cyan   { background: rgba(6,182,212,0.15);   color: var(--accent-cyan);    border: 1px solid rgba(6,182,212,0.3); }
  .badge-green  { background: rgba(16,185,129,0.15);  color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.3); }
  .badge-amber  { background: rgba(245,158,11,0.15);  color: var(--accent-amber);   border: 1px solid rgba(245,158,11,0.3); }
  .badge-rose   { background: rgba(244,63,94,0.15);   color: var(--accent-rose);    border: 1px solid rgba(244,63,94,0.3); }
  .badge-violet { background: rgba(139,92,246,0.15);  color: var(--accent-violet);  border: 1px solid rgba(139,92,246,0.3); }
  .badge-orange { background: rgba(249,115,22,0.15);  color: var(--accent-orange);  border: 1px solid rgba(249,115,22,0.3); }

  /* --- Typography --- */
  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .heading-xl {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  .heading-lg {
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  .heading-md {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    letter-spacing: -0.015em;
  }

  .text-gradient-blue {
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .text-gradient-amber {
    background: linear-gradient(135deg, #fbbf24, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .text-gradient-rose {
    background: linear-gradient(135deg, #fb7185, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* --- Progress Bars --- */
  .progress-track {
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: rgba(255,255,255,0.3);
    border-radius: 100px;
    filter: blur(4px);
  }

  /* --- Grid --- */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }

  /* --- Stat display --- */
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }

  .stat-delta {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .delta-pos { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
  .delta-neg { background: rgba(244,63,94,0.15);  color: var(--accent-rose); }
  .delta-neu { background: rgba(245,158,11,0.15); color: var(--accent-amber); }

  /* --- Selection card --- */
  .select-card {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    cursor: pointer;
    transition: all var(--transition);
    user-select: none;
  }
  .select-card:hover { border-color: var(--accent-blue); background: var(--bg-elevated); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.15); }
  .select-card.selected { border-color: var(--accent-blue); background: rgba(59,130,246,0.1); box-shadow: 0 0 0 1px var(--accent-blue), 0 8px 24px rgba(59,130,246,0.2); }
  .select-card.correct  { border-color: var(--accent-emerald); background: rgba(16,185,129,0.1); }
  .select-card.wrong    { border-color: var(--accent-rose); background: rgba(244,63,94,0.08); }

  /* --- Divider --- */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* --- Step indicator --- */
  .step-bar {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 40px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    transition: all var(--transition);
  }
  .step-dot.done    { background: var(--accent-emerald); color: #fff; }
  .step-dot.active  { background: var(--accent-blue); color: #fff; box-shadow: 0 0 14px rgba(59,130,246,0.5); }
  .step-dot.pending { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
  .step-line { width: 32px; height: 2px; background: var(--border); flex-shrink: 0; transition: background var(--transition); }
  .step-line.done { background: var(--accent-emerald); }
  .step-label { font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .step-label.active { color: var(--accent-blue); }

  /* --- Crisis card --- */
  .crisis-banner {
    background: linear-gradient(135deg, rgba(244,63,94,0.15) 0%, rgba(249,115,22,0.1) 100%);
    border: 1px solid rgba(244,63,94,0.4);
    border-radius: var(--radius-lg);
    padding: 28px;
    position: relative;
    overflow: hidden;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .crisis-banner::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(244,63,94,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  /* --- Negotiation round --- */
  .negotiation-choice {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .negotiation-choice:hover { border-color: var(--accent-violet); background: rgba(139,92,246,0.08); transform: translateX(4px); }
  .negotiation-choice.chosen { border-color: var(--accent-violet); background: rgba(139,92,246,0.12); }

  /* --- Score ring --- */
  .score-ring {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 140px;
    height: 140px;
  }

  /* --- Tooltip context box --- */
  .context-box {
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.25);
    border-left: 3px solid var(--accent-cyan);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* --- Alert box --- */
  .alert {
    border-radius: var(--radius-md);
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .alert-info    { background: rgba(59,130,246,0.1);  border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  .alert-success { background: rgba(16,185,129,0.1);  border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .alert-warn    { background: rgba(245,158,11,0.1);  border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
  .alert-error   { background: rgba(244,63,94,0.1);   border: 1px solid rgba(244,63,94,0.3);  color: #fca5a5; }

  /* Welcome specific */
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 500px;
    margin: 32px auto;
  }
  .hero-stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    text-align: center;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .screen { padding: 24px 0 48px; }
    .step-label { display: none; }
    .hero-grid { grid-template-columns: 1fr; max-width: 280px; }
  }

  /* Final score specific */
  .score-big {
    font-size: 72px;
    font-weight: 900;
    font-family: var(--font-mono);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .feedback-block {
    border-radius: var(--radius-md);
    padding: 20px;
    margin-bottom: 12px;
  }

  /* Action check mark */
  .check-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    transition: all var(--transition);
  }
  .check-circle.checked { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
</style>
</head>

const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const clamp = (v, mn=0, mx=100) => Math.max(mn, Math.min(mx, v));
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

function StepBar({ current }) {
  const steps = ['Company', 'Crisis', 'War Room', 'Negotiate', 'CEO', 'AI Strategy', 'Results'];
  return (
    <div className="step-bar">
      {steps.map((s, i) => (
        <React.Fragment key={s}>
          <div className="step-item">
            <div className={`step-dot ${i < current ? 'done' : i === current ? 'active' : 'pending'}`}>
              {i < current ? '✓' : i + 1}
            </div>
            <span className={`step-label ${i === current ? 'active' : ''}`}>{s}</span>
          </div>
          {i < steps.length - 1 && <div className={`step-line ${i < current ? 'done' : ''}`} />}
        </React.Fragment>
      ))}
    </div>
  );
}

function ProgressBar({ value, color = '#3b82f6', label, showValue = true, animate = true }) {
  const [display, setDisplay] = useState(animate ? 0 : value);
  useEffect(() => {
    if (!animate) return;
    const t = setTimeout(() => setDisplay(value), 100);
    return () => clearTimeout(t);
  }, [value, animate]);
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
        {label && <span style={{ fontSize: 13, color: 'var(--text-secondary)', fontWeight: 500 }}>{label}</span>}
        {showValue && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color, fontWeight: 600 }}>{display}%</span>}
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${display}%`, background: `linear-gradient(90deg, ${color}99, ${color})`, transition: 'width 1.1s cubic-bezier(0.4,0,0.2,1)' }} />
      </div>
    </div>
  );
}

function MetricCard({ label, value, delta, color }) {
  return (
    <div className="card-elevated" style={{ border: `1px solid ${color}30` }}>
      <div className="label" style={{ marginBottom: 8 }}>{label}</div>
      <div className="stat-value" style={{ color, marginBottom: 6 }}>{value}%</div>
      {delta !== undefined && (
        <span className={`stat-delta ${delta >= 0 ? 'delta-pos' : 'delta-neg'}`}>
          {delta >= 0 ? '↑' : '↓'} {Math.abs(delta)}%
        </span>
      )}
      <div style={{ marginTop: 10 }}>
        <ProgressBar value={value} color={color} showValue={false} />
      </div>
    </div>
  );
}

function WarRoomScreen({ crisis, onNext }) {
  const [selected, setSelected] = useState([]);
  const [confirmed, setConfirmed] = useState(false);
  const [metrics, setMetrics] = useState({ cost: 70, inventory: 65, profit: 75, speed: 68, satisfaction: 72 });

  const actions = useRef(shuffle(ALL_ACTIONS)).current;

  const toggle = (id) => {
    if (confirmed) return;
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 3) return prev;
      return [...prev, id];
    });
  };

  const confirmActions = () => {
    const chosen = actions.filter(a => selected.includes(a.id));
    const newMetrics = { ...metrics };
    chosen.forEach(a => {
      newMetrics.cost = clamp(newMetrics.cost + a.effect.cost);
      newMetrics.inventory = clamp(newMetrics.inventory + a.effect.inventory);
      newMetrics.profit = clamp(newMetrics.profit + a.effect.profit);
      newMetrics.speed = clamp(newMetrics.speed + a.effect.speed);
      newMetrics.satisfaction = clamp(newMetrics.satisfaction + a.effect.satisfaction);
    });
    // Apply crisis hit
    newMetrics.cost = clamp(newMetrics.cost + crisis.costHit);
    newMetrics.inventory = clamp(newMetrics.inventory + crisis.inventoryHit);
    newMetrics.profit = clamp(newMetrics.profit + crisis.profitHit);
    newMetrics.speed = clamp(newMetrics.speed + crisis.speedHit);
    newMetrics.satisfaction = clamp(newMetrics.satisfaction + crisis.satisfactionHit);
    setMetrics(newMetrics);
    setConfirmed(true);
  };

  const qualityColors = { good: '#10b981', costly: '#f59e0b', strategic: '#8b5cf6', free: '#3b82f6' };

// ─── SCREEN 5: Negotiation ────────────────────────────────────────────────────

function NegotiationScreen({ onNext }) {
  const [round, setRound] = useState(0);
  const [chosen, setChosen] = useState([]);
  const [scores, setScores] = useState({ trust: 50, price: 50, lead: 50 });
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  const current = NEG_ROUNDS[round];

  const choose = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    const c = current.choices[idx];
    setScores(prev => ({
      trust: clamp(prev.trust + c.trust),
      price: clamp(prev.price + c.price),
      lead: clamp(prev.lead + c.lead),
    }));
    setChosen(prev => [...prev, { round: round + 1, choice: c.label }]);
  };

  const next = () => {
    setSelected(null);
    setRevealed(false);
    if (round < NEG_ROUNDS.length - 1) {
      setRound(r => r + 1);
    } else {
      const negScore = Math.round((scores.trust * 0.5 + scores.price * 0.25 + scores.lead * 0.25));
      onNext(negScore, scores, chosen);
    }
  };

  const trustColor = scores.trust >= 65 ? '#10b981' : scores.trust >= 40 ? '#f59e0b' : '#f43f5e';

  return (
    <div className="screen">
      <div className="container">
        <StepBar current={3} />
        <div className="context-box">
          🤝 <strong>Negotiation 101:</strong> Supply chain negotiations are rarely zero-sum. The goal is a deal that works for both sides — because you need this supplier again next month. Trust is your most valuable currency.

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, flexWrap: 'wrap', gap: 12 }}>
          <div>
            <div className="label" style={{ marginBottom: 4 }}>Supplier Negotiation</div>
            <h2 className="heading-md">Round {round + 1} of 4: {current.situation}</h2>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {NEG_ROUNDS.map((_, i) => (
              <div key={i} style={{
                width: 10, height: 10, borderRadius: '50%',
                background: i < round ? '#10b981' : i === round ? '#3b82f6' : 'var(--border)',
                transition: 'background 0.3s'
              }} />
            ))}
          </div>
        </div>

        <div className="grid-3" style={{ marginBottom: 24 }}>
          <div className="card-elevated">
            <div className="label" style={{ marginBottom: 6 }}>🤝 Supplier Trust</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 700, color: trustColor }}>{scores.trust}%</div>
            <ProgressBar value={scores.trust} color={trustColor} showValue={false} animate={false} />
          </div>
          <div className="card-elevated">
            <div className="label" style={{ marginBottom: 6 }}>💰 Price Advantage</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 700, color: '#3b82f6' }}>{scores.price}%</div>
            <ProgressBar value={scores.price} color="#3b82f6" showValue={false} animate={false} />
          </div>
          <div className="card-elevated">
            <div className="label" style={{ marginBottom: 6 }}>⚡ Lead Time Score</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 700, color: '#8b5cf6' }}>{scores.lead}%</div>
            <ProgressBar value={scores.lead} color="#8b5cf6" showValue={false} animate={false} />
          </div>
        </div>

        <div className="card" style={{ marginBottom: 20, borderColor: '#2a4a7f' }}>
          <div className="label" style={{ marginBottom: 8, color: 'var(--accent-cyan)' }}>SITUATION</div>
          <p style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 16 }}>{current.context}</p>
          <div className="divider" />
          <p style={{ fontWeight: 600, fontSize: 16, marginTop: 16 }}>{current.question}</p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 24 }}>
          {current.choices.map((c, i) => (
            <div key={i}
              className={`negotiation-choice ${selected === i ? 'chosen' : ''}`}
              onClick={() => choose(i)}
              style={{ opacity: revealed && selected !== i ? 0.55 : 1 }}>
              <div style={{
                width: 28, height: 28, borderRadius: 8, background: 'var(--bg-base)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 13, color: 'var(--text-muted)', flexShrink: 0,
                border: selected === i ? '2px solid var(--accent-violet)' : '1px solid var(--border)',
                color: selected === i ? 'var(--accent-violet)' : 'var(--text-muted)',
              }}>
                {String.fromCharCode(65 + i)}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{c.text}</div>
                {revealed && selected === i && (
                  <div style={{ display: 'flex', gap: 8, marginTop: 10, flexWrap: 'wrap', animation: 'fadeIn 0.3s ease' }}>
                    <span className={`stat-delta ${c.trust >= 0 ? 'delta-pos' : 'delta-neg'}`}>Trust {c.trust >= 0 ? '+' : ''}{c.trust}</span>

// ─── SCREEN 6: CEO Boardroom ───────────────────────────────────────────────────

function CEOScreen({ onNext }) {
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [totalScore, setTotalScore] = useState(0);

  const q = CEO_QUESTIONS[qIdx];

  const choose = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    setTotalScore(prev => prev + q.choices[idx].score);
    setAnswers(prev => [...prev, { q: q.q, chosen: q.choices[idx].label, best: q.choices[q.best].label, score: q.choices[idx].score }]);
  };

  const next = () => {
    setSelected(null);
    setRevealed(false);
    if (qIdx < CEO_QUESTIONS.length - 1) {
      setQIdx(i => i + 1);
    } else {
      const maxScore = CEO_QUESTIONS.reduce((s, q) => s + Math.max(...q.choices.map(c => c.score)), 0);
      onNext(Math.round((totalScore / maxScore) * 100), answers);
    }
  };

  const maxQ = Math.max(...q.choices.map(c => c.score));

  return (
    <div className="screen">
      <div className="container">
        <StepBar current={4} />
        <div className="context-box">
          👔 <strong>CEO Boardroom:</strong> Now you're in the leadership seat. These questions test executive judgment — how you handle pressure, culture, finance, and strategy. There are better and worse answers, and the explanations will show you why.

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, flexWrap: 'wrap', gap: 10 }}>
          <div>
            <div className="label" style={{ marginBottom: 4 }}>Executive Decision Making</div>
            <h2 className="heading-md">Question {qIdx + 1} of {CEO_QUESTIONS.length}</h2>
          </div>
          <span className="badge badge-violet">Score: {totalScore} pts</span>
        </div>

        <div className="card" style={{ marginBottom: 20, borderColor: '#4c1d95' }}>
          <div className="label" style={{ color: 'var(--accent-violet)', marginBottom: 8 }}>LEADERSHIP SCENARIO</div>
          <div className="alert alert-info" style={{ marginBottom: 16 }}>{q.context}</div>
          <p style={{ fontWeight: 600, fontSize: 16, lineHeight: 1.5 }}>{q.q}</p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
          {q.choices.map((c, i) => {
            const isChosen = selected === i;
            const isBest = revealed && i === q.best;
            return (
              <div key={i}
                className={`select-card ${isChosen ? (i === q.best ? 'correct' : 'wrong') : isBest ? 'correct' : ''}`}
                onClick={() => choose(i)}
                style={{ opacity: revealed && !isChosen && !isBest ? 0.5 : 1 }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14 }}>
                  <div style={{
                    width: 26, height: 26, borderRadius: 8, flexShrink: 0, marginTop: 1,
                    background: isBest && revealed ? 'rgba(16,185,129,0.2)' : isChosen && !isBest && revealed ? 'rgba(244,63,94,0.2)' : 'var(--bg-elevated)',
                    border: `1px solid ${isBest && revealed ? '#10b981' : isChosen && !isBest && revealed ? '#f43f5e' : 'var(--border)'}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 12, fontWeight: 700,
                    color: isBest && revealed ? '#10b981' : isChosen && !isBest && revealed ? '#f43f5e' : 'var(--text-muted)',
                  }}>
                    {revealed ? (isBest ? '✓' : isChosen ? '✗' : String.fromCharCode(65 + i)) : String.fromCharCode(65 + i)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{c.label}</div>
                    <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{c.text}</div>
                    {revealed && (
                      <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'center' }}>
                        <span style={{
                          fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600,
                          color: c.score === maxQ ? '#10b981' : c.score >= 6 ? '#f59e0b' : '#f43f5e',
                          background: 'rgba(0,0,0,0.3)', padding: '2px 8px', borderRadius: 6,
                        }}>
                          {c.score}/10 pts
                        </span>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {revealed && (
          <div style={{ animation: 'fadeIn 0.3s ease' }}>
            <div className="alert alert-success" style={{ marginBottom: 20 }}>
              <strong>Expert Insight:</strong> {q.explanation}
            </div>
            <button className="btn btn-primary" onClick={next}>
              {qIdx < CEO_QUESTIONS.length - 1 ? 'Next Question →' : 'View CEO Score →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function FinalScreen({ data, onReplay }) {
  const { warMetrics, negScore, negChoices, ceoScore, aiInvestments, crisis, company } = data;

  const resilience = clamp(Math.round((warMetrics.inventory + warMetrics.speed) / 2));
  const costControl = clamp(warMetrics.cost);

  const negotiation = clamp(negScore);

  const overall = clamp(Math.round(
    resilience * 0.2 + costControl * 0.15 + riskMgmt * 0.2 + custSat * 0.15 + leadership * 0.15 + negotiation * 0.15
  ));

  const grade = overall >= 85 ? { label: 'A+', title: 'Supply Chain Visionary', color: '#10b981' }

    : overall >= 40 ? { label: 'C', title: 'Learning Leader', color: '#f59e0b' }

  const aiNames = AI_INVESTMENTS.filter(a => aiInvestments.includes(a.id)).map(a => a.name);

  const biggestMistake = negChoices.find(c => c.choice === 'CEO Escalation')
    ? 'Going over your supplier contact\'s head in Round 3 burned trust that takes months to rebuild.'
    : ceoScore < 60 ? 'Several CEO decisions prioritized short-term optics over long-term resilience.'
    : warMetrics.inventory < 40 ? 'Inventory levels dropped critically low — stockouts may follow.'
    : 'You played it well overall, but cost control under crisis could have been sharper.';

  const bestDecision = warMetrics.satisfaction >= 70
    ? 'Maintaining customer satisfaction above 70% during a crisis is exceptional — most companies lose 25-35% of accounts in similar scenarios.'
    : negotiation >= 65 ? 'Your negotiation preserved supplier trust, which is your most durable supply chain asset.'
    : 'Activating crisis response quickly minimized the blast radius of the disruption.';

  const recommendation = overall >= 70
    ? `Invest in "${aiNames[0]}" as your first AI priority — your instincts are strong and technology will amplify them further.`

  const categories = [
    { label: 'Leadership', value: leadership, color: '#8b5cf6', icon: '👔' },

    { label: 'Resilience', value: resilience, color: '#10b981', icon: '🛡️' },
    { label: 'Cost Control', value: costControl, color: '#3b82f6', icon: '💰' },
    { label: 'Risk Management', value: riskMgmt, color: '#f59e0b', icon: '⚠️' },
    { label: 'Customer Satisfaction', value: custSat, color: '#f43f5e', icon: '⭐' },
  ];

  return (
    <div className="screen">
      <div className="container">
        <StepBar current={6} />

        {/* Hero Score */}
        <div style={{ textAlign: 'center', marginBottom: 48, padding: '40px 0 20px' }}>

          <div className="score-big" style={{ color: grade.color, marginBottom: 8, animation: 'countUp 0.5s ease' }}>
            {overall}
          </div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 16, fontFamily: 'var(--font-mono)' }}>OVERALL CRISIS SCORE / 100</div>
          <div className="badge" style={{ background: `${grade.color}20`, color: grade.color, border: `1px solid ${grade.color}40`, fontSize: 14, padding: '6px 20px' }}>
            {grade.label} · {grade.title}
          </div>
        </div>

        {/* Category scores */}
        <div className="grid-3" style={{ marginBottom: 32 }}>
          {categories.map(c => (
            <MetricCard key={c.label} label={`${c.icon} ${c.label}`} value={c.value} color={c.color} />
          ))}
        </div>

        <div className="grid-2" style={{ marginBottom: 28 }}>
          {/* Personalized Feedback */}
          <div className="card" style={{ borderColor: grade.color + '40' }}>
            <div className="label" style={{ marginBottom: 12 }}>Performance Analysis</div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 6, fontWeight: 600 }}>BIGGEST MISTAKE</div>

              <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 6, fontWeight: 600 }}>BEST DECISION</div>

            </div>
            <div>
              <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 6, fontWeight: 600 }}>EXPERT RECOMMENDATION</div>
              <div className="alert alert-info">{recommendation}</div>
            </div>
          </div>

          {/* Summary */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div className="card">
              <div className="label" style={{ marginBottom: 10 }}>Crisis Faced</div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <span style={{ fontSize: 28 }}>{crisis.emoji}</span>
                <div>
                  <div style={{ fontWeight: 700 }}>{crisis.name}</div>
                  <span className={`badge ${crisis.urgency === 'CRITICAL' ? 'badge-rose' : crisis.urgency === 'HIGH' ? 'badge-orange' : 'badge-amber'}`} style={{ marginTop: 4 }}>
                    {crisis.urgency}
                  </span>
                </div>
              </div>
            </div>

            <div className="card">
              <div className="label" style={{ marginBottom: 10 }}>AI Investments Chosen</div>
              {aiNames.map(name => (
                <div key={name} style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 }}>
                  <span className="badge badge-violet">🤖 {name}</span>
                </div>
              ))}
            </div>

            <div className="card">
              <div className="label" style={{ marginBottom: 10 }}>Negotiation Path</div>
              {negChoices.map((c, i) => (
                <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 6 }}>
                  <div style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--bg-elevated)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: 'var(--text-muted)', flexShrink: 0 }}>
                    {i + 1}
                  </div>
                  <span className="badge badge-cyan" style={{ fontSize: 11 }}>{c.choice}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Lessons Learned */}
        <div className="card" style={{ marginBottom: 32, borderColor: '#2a4a7f' }}>
          <div className="heading-md" style={{ marginBottom: 16 }}>📚 Lessons Learned</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[
              'Supply chain resilience isn\'t built during a crisis — it\'s built in the months and years before one.',
              'Supplier relationships are assets. Trust takes years to build and hours to destroy.',
              'Proactive customer communication during disruptions saves accounts that silence would lose.',
              'AI amplifies good supply chain practices; it can\'t compensate for structural weaknesses.',
              `With ${company.inventoryDays} days of inventory, ${company.name} had ${company.inventoryDays < 20 ? 'dangerously little' : company.inventoryDays < 35 ? 'moderate' : 'solid'} buffer — real companies aim for 30-45 days in critical categories.`,
              'Dual-sourcing is the most powerful single tool against supply disruption.',
            ].map((lesson, i) => (
              <div key={i} style={{ display: 'flex', gap: 14, padding: '12px 16px', background: 'var(--bg-elevated)', borderRadius: 10 }}>
                <span style={{ color: 'var(--accent-cyan)', fontWeight: 700, flexShrink: 0 }}>{i + 1}.</span>
                <span style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{lesson}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ textAlign: 'center', display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn btn-primary" onClick={onReplay} style={{ fontSize: 16, padding: '14px 40px' }}>
            🔄 Play Again (New Scenario)
          </button>
        </div>
        <p style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: 13, marginTop: 16 }}>
          Every playthrough uses a randomly generated company and crisis · No two games are identical
        </p>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('welcome');
  const [company, setCompany] = useState(null);
  const [crisis, setCrisis] = useState(null);
  const [warMetrics, setWarMetrics] = useState(null);
  const [negScore, setNegScore] = useState(null);
  const [negScores, setNegScores] = useState(null);
  const [negChoices, setNegChoices] = useState([]);
  const [ceoScore, setCeoScore] = useState(null);
  const [aiInvestments, setAiInvestments] = useState([]);

  const start = () => {
    setCompany(generateCompany());
    setCrisis(generateCrisis());
    setScreen('company');
  };

  const replay = () => {
    setScreen('welcome');
    setCompany(null); setCrisis(null); setWarMetrics(null);
    setNegScore(null); setNegScores(null); setNegChoices([]);
    setCeoScore(null); setAiInvestments([]);
  };

  if (screen === 'welcome') return <WelcomeScreen onStart={start} />;
  if (screen === 'company') return <CompanyScreen company={company} onNext={() => setScreen('crisis')} />;
  if (screen === 'crisis')  return <CrisisScreen  crisis={crisis} company={company} onNext={() => setScreen('warroom')} />;
  if (screen === 'warroom') return <WarRoomScreen crisis={crisis} onNext={(m) => { setWarMetrics(m); setScreen('negotiation'); }} />;
  if (screen === 'negotiation') return <NegotiationScreen onNext={(score, scores, choices) => { setNegScore(score); setNegScores(scores); setNegChoices(choices); setScreen('ceo'); }} />;
  if (screen === 'ceo') return <CEOScreen onNext={(score) => { setCeoScore(score); setScreen('ai'); }} />;
  if (screen === 'ai')  return <AIScreen onNext={(inv) => { setAiInvestments(inv); setScreen('final'); }} />;
  if (screen === 'final') return <FinalScreen
    data={{ warMetrics, negScore, negChoices, ceoScore, aiInvestments, crisis, company }}
    onReplay={replay}
  />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
