<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Readiness — Coordinator Desk</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F5F1;
    --paper-tab:#EFEBE2;
    --ink:#1B2A4A;
    --ink-soft:#3D4A66;
    --clear:#0F6E5C;
    --clear-bg:#E3EFEA;
    --deny:#B5482A;
    --deny-bg:#F5E6E0;
    --pend:#C99A3B;
    --pend-bg:#FAF1DD;
    --slate:#5B6472;
    --slate-bg:#E9E8E4;
    --rule:#D8D3C7;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px);
    background-size: 100% 2.1em;
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
  }
  .font-display{font-family:'Source Serif 4', serif;}
  .font-mono{font-family:'IBM Plex Mono', monospace;}

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* Focus visibility */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:3px solid var(--ink);
    outline-offset:2px;
  }

  .chart-card{
    background:#FFFDF9;
    border:1px solid var(--rule);
    border-left:4px solid var(--ink);
    box-shadow: 2px 3px 0 rgba(27,42,74,0.04);
  }

  .tab-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  .face-input{
    background:#FFFDF9;
    border:1px solid var(--rule);
    border-bottom:2px solid var(--ink-soft);
    border-radius:2px;
    padding:0.6rem 0.75rem;
    font-size:0.92rem;
    width:100%;
    transition:border-color .15s ease, background .15s ease;
  }
  .face-input:focus{
    border-bottom-color:var(--clear);
    background:#fff;
  }

  .status-chip{
    display:inline-flex;align-items:center;gap:0.4rem;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;letter-spacing:0.04em;text-transform:uppercase;
    padding:0.28rem 0.6rem;border-radius:3px;font-weight:600;
  }
  .chip-clear{background:var(--clear-bg); color:var(--clear);}
  .chip-pend{background:var(--pend-bg); color:#8a6a1f;}
  .chip-deny{background:var(--deny-bg); color:var(--deny);}
  .chip-slate{background:var(--slate-bg); color:var(--slate);}

  .btn-primary{
    background:var(--ink); color:#fff;
    font-weight:600; letter-spacing:0.01em;
    border-radius:3px; transition:background .15s ease, transform .1s ease;
  }
  .btn-primary:hover{background:#0f1c38;}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{background:var(--slate); cursor:not-allowed; opacity:0.6;}

  .btn-ghost{
    background:transparent; border:1.5px solid var(--ink);
    color:var(--ink); font-weight:600; border-radius:3px;
    transition:background .15s ease;
  }
  .btn-ghost:hover{background:rgba(27,42,74,0.06);}

  .btn-action{
    background:#FFFDF9; border:1px solid var(--rule); border-radius:3px;
    color:var(--ink); font-weight:500; text-align:left;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .btn-action:hover{border-color:var(--ink); box-shadow:1px 2px 0 rgba(27,42,74,0.08);}
  .btn-action:disabled{opacity:0.45; cursor:not-allowed;}
  .btn-action.done{border-color:var(--clear); background:var(--clear-bg);}

  /* Chart spine timeline */
  .spine{position:relative; padding-left:1.6rem;}
  .spine::before{
    content:'';position:absolute;left:0.42rem;top:0.3rem;bottom:0.3rem;width:2px;
    background:var(--rule);
  }
  .spine-node{position:relative; padding-bottom:1.15rem;}
  .spine-node::before{
    content:'';position:absolute;left:-1.6rem;top:0.15rem;width:0.85rem;height:0.85rem;
    border-radius:50%;background:#FFFDF9;border:2px solid var(--slate);
  }
  .spine-node.complete::before{background:var(--clear); border-color:var(--clear);}
  .spine-node.active::before{background:var(--pend); border-color:var(--pend); box-shadow:0 0 0 3px var(--pend-bg);}

  /* Admission stamp */
  .stamp-wrap{
    width:148px;height:148px;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .stamp-ring{
    position:absolute;inset:0;border-radius:50%;
    border:3px solid var(--slate);
    opacity:0.35;
  }
  .stamp-ring.armed{
    border-color:var(--clear);
    opacity:1;
    filter:url(#inkRough);
  }
  .stamp-ring.denied-tone{ border-color: var(--deny); opacity:1; }
  .stamp-text{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    text-align:center;
    line-height:1.05;
  }

  .risk-bar-track{height:7px; border-radius:4px; background:#E5E1D8; overflow:hidden;}
  .risk-bar-fill{height:100%; border-radius:4px;}

  .pulse-dot{
    width:7px;height:7px;border-radius:50%;display:inline-block;
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:translateY(0);}}

  .illustrative-tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.62rem; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--slate);
  }

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--rule); border-radius:4px;}

  .moon-banner{
    background:repeating-linear-gradient(135deg, #FAF1DD, #FAF1DD 10px, #F5E9C8 10px, #F5E9C8 20px);
    border:1px solid #C99A3B;
  }
</style>
</head>
<body class="min-h-screen">

<svg width="0" height="0" class="absolute"><filter id="inkRough"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/></filter></svg>

<div id="app" class="max-w-6xl mx-auto px-4 sm:px-6 py-8"></div>

<script>
(function(){
  "use strict";

  /* ============== STATE ============== */
  const state = {
    screen: 'setup', // setup | analysis | decision
    form: {
      provider: '',
      attending: '',
      diagnosis: '',
      admissionType: '',
      paStatus: '',
      admissionDate: ''
    },
    score: 0,
    paSubState: null, // for pending/denied sub-flows
    appealSuccessful: false,
    actions: {
      bed: false,
      insurance: false,
      documentation: false,
      consent: false,
      physician: false,
      nursing: false,
      arrival: false
    },
    paActions: {
      followUp:false, uploadDocs:false, contactPhysician:false,
      reviewReason:false, contactInsurance:false, submitAppeal:false
    },
    log: []
  };

  const DIAGNOSES = ['Acute MI','CHF','Pneumonia','Elective Surgery','Hip Fracture'];
  const ADMISSION_TYPES = ['Inpatient','Observation','Emergency','ICU','Same-Day Surgery'];
  const PA_STATUSES = ['Approved','Pending','Denied'];

  const WEIGHTS = { pa:25, doc:20, orders:20, ins:15, consent:10, bed:10 };

  /* ============== UTIL ============== */
  function el(tag, cls, html){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(html !== undefined) e.innerHTML = html;
    return e;
  }
  function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
  function isHighAcuity(){
    return state.form.diagnosis === 'Acute MI' || state.form.diagnosis === 'CHF' || state.form.admissionType === 'ICU';
  }
  function isCriteriaDx(){
    return state.form.diagnosis === 'Acute MI' || state.form.diagnosis === 'CHF';
  }
  function paEffective(){
    if(state.form.paStatus === 'Denied' && state.appealSuccessful) return 'Approved';
    return state.form.paStatus;
  }

  /* ============== SCORING ============== */
  function computeScore(){
    let pct = 0;
    // PA component (25%)
    const pa = paEffective();
    let paFrac = 0;
    if(pa === 'Approved') paFrac = 1;
    else if(pa === 'Pending'){
      const done = [state.paActions.followUp, state.paActions.uploadDocs, state.paActions.contactPhysician].filter(Boolean).length;
      paFrac = 0.15 + done * 0.2; // partial credit, never full until approved
      paFrac = clamp(paFrac, 0, 0.7);
    } else if(pa === 'Denied'){
      const done = [state.paActions.reviewReason, state.paActions.contactInsurance, state.paActions.submitAppeal].filter(Boolean).length;
      paFrac = clamp(done * 0.12, 0, 0.35); // capped hard — denied PA can't carry the score
    }
    pct += paFrac * WEIGHTS.pa;

    // Documentation (20%)
    let docFrac = state.actions.documentation ? 1 : 0.2;
    pct += docFrac * WEIGHTS.doc;

    // Physician orders (20%) - tied to "Contact Physician" workflow action + attending filled
    let ordersFrac = state.actions.physician ? 1 : 0.25;
    pct += ordersFrac * WEIGHTS.orders;

    // Insurance (15%)
    let insFrac = state.actions.insurance ? 1 : 0.3;
    pct += insFrac * WEIGHTS.ins;

    // Consent (10%)
    let consentFrac = state.actions.consent ? 1 : 0.2;
    pct += consentFrac * WEIGHTS.consent;

    // Bed (10%)
    let bedFrac = state.actions.bed ? 1 : 0.3;
    pct += bedFrac * WEIGHTS.bed;

    pct = clamp(Math.round(pct), 0, 100);

    // Hard guardrail: Denied PA + ICU admission cannot reach 70% from admin tasks alone
    if(state.form.paStatus === 'Denied' && !state.appealSuccessful && state.form.admissionType === 'ICU'){
      pct = Math.min(pct, 69);
    }

    return pct;
  }

  function initialScoreSeed(){
    // Initial Analysis must land 30-60%
    const base = 30 + Math.floor(Math.random()*16); // 30-45 base
    let adj = base;
    if(state.form.paStatus === 'Approved') adj += 10;
    if(state.form.paStatus === 'Denied') adj -= 6;
    if(isHighAcuity()) adj -= 4;
    return clamp(adj, 30, 60);
  }

  /* ============== RENDER ROOT ============== */
  function render(){
    const app = document.getElementById('app');
    app.innerHTML = '';
    app.appendChild(buildHeader());
    if(state.screen === 'setup') app.appendChild(buildSetup());
    if(state.screen === 'analysis' || state.screen === 'decision') app.appendChild(buildAnalysisShell());
  }

  function buildHeader(){
    const wrap = el('div','mb-7 flex items-start justify-between gap-4 flex-wrap');
    const left = el('div');
    left.appendChild(el('div','tab-label text-[var(--slate)] mb-1','ADMITTING · CARE COORDINATION DESK'));
    left.appendChild(el('h1','font-display text-[1.9rem] sm:text-[2.2rem] leading-tight text-[var(--ink)]','Admission Readiness Simulator'));
    left.appendChild(el('p','text-sm text-[var(--ink-soft)] mt-1 max-w-xl','Training simulation. Provider, payer, and physician names shown are illustrative only and do not represent real entities.'));
    wrap.appendChild(left);

    if(state.screen !== 'setup'){
      const badge = el('div','chart-card rounded px-4 py-3 min-w-[210px]');
      badge.innerHTML = `
        <div class="tab-label text-[var(--slate)] mb-1">PATIENT FACE SHEET</div>
        <div class="font-mono text-[0.8rem] text-[var(--ink)] leading-relaxed">
          <div><span class="text-[var(--slate)]">Dx:</span> ${state.form.diagnosis}</div>
          <div><span class="text-[var(--slate)]">Type:</span> ${state.form.admissionType}</div>
          <div><span class="text-[var(--slate)]">Attending:</span> ${state.form.attending || '—'}</div>
        </div>`;
      wrap.appendChild(badge);
    }
    return wrap;
  }

  /* ============== SETUP SCREEN ============== */
  function buildSetup(){
    const wrap = el('div','fade-in');
    const card = el('div','chart-card rounded-md p-6 sm:p-8 max-w-3xl');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-2','STEP 1 OF 1 · INTAKE FACE SHEET'));
    card.appendChild(el('h2','font-display text-xl text-[var(--ink)] mb-5','Open a new admission record'));

    const grid = el('div','grid sm:grid-cols-2 gap-4');

    grid.appendChild(fieldText('provider','Provider (illustrative)','e.g. Meridian Health Network','Training data only — not a real insurer or hospital system.'));
    grid.appendChild(fieldText('attending','Attending Physician (illustrative)','e.g. Dr. R. Okafor, IM'));
    grid.appendChild(fieldSelect('diagnosis','Diagnosis', DIAGNOSES, 'Select diagnosis'));
    grid.appendChild(fieldSelect('admissionType','Admission Type', ADMISSION_TYPES, 'Select admission type'));
    grid.appendChild(fieldSelect('paStatus','Prior Authorization Status', PA_STATUSES, 'Select PA status'));
    grid.appendChild(fieldDate('admissionDate','Admission Date'));

    wrap.appendChild(card);
    card.appendChild(grid);

    // Observation banner (always visible when selected)
    const obsBannerSlot = el('div','mt-5');
    card.appendChild(obsBannerSlot);

    function renderObsBanner(){
      obsBannerSlot.innerHTML = '';
      if(state.form.admissionType === 'Observation'){
        const b = el('div','moon-banner rounded px-4 py-3 fade-in');
        b.innerHTML = `<div class="flex gap-3 items-start">
          <span class="text-base mt-0.5">⏱️</span>
          <p class="text-[0.85rem] text-[#5C4717] leading-relaxed"><strong>CMS 2-Midnight Rule applies</strong> — different cost-sharing, SNF eligibility, and billing than inpatient. Medicare patients require written MOON notification.</p>
        </div>`;
        obsBannerSlot.appendChild(b);
      }
    }
    renderObsBanner();

    // Criteria note for Acute MI / CHF
    const criteriaSlot = el('div','mt-3');
    card.appendChild(criteriaSlot);
    function renderCriteriaNote(){
      criteriaSlot.innerHTML = '';
      if(isCriteriaDx()){
        const b = el('div','rounded px-4 py-3 fade-in','');
        b.style.background = 'var(--slate-bg)';
        b.style.borderLeft = '3px solid var(--ink-soft)';
        b.innerHTML = `<p class="text-[0.85rem] text-[var(--ink-soft)] leading-relaxed"><strong>InterQual/Milliman thresholds apply</strong> — ensure documentation meets medical necessity standards before UR review.</p>`;
        criteriaSlot.appendChild(b);
      }
    }
    renderCriteriaNote();

    // footer
    const footer = el('div','mt-6 flex items-center justify-between flex-wrap gap-3');
    const reqNote = el('p','text-xs text-[var(--slate)]','All fields required to open the readiness analysis.');
    footer.appendChild(reqNote);

    const btn = el('button','btn-primary px-5 py-3 rounded text-sm flex items-center gap-2');
    btn.innerHTML = `🏥 <span>Analyze Admission Readiness</span>`;
    btn.disabled = !allFieldsFilled();
    btn.addEventListener('click', () => {
      if(!allFieldsFilled()) return;
      startAnalysis();
    });
    footer.appendChild(btn);
    card.appendChild(footer);

    function allFieldsFilled(){
      const f = state.form;
      return f.provider.trim() && f.attending.trim() && f.diagnosis && f.admissionType && f.paStatus && f.admissionDate;
    }

    function fieldText(key, label, placeholder, hint){
      const wrap = el('div','flex flex-col gap-1');
      wrap.appendChild(el('label','text-xs font-semibold text-[var(--ink-soft)]', label));
      const input = el('input','face-input');
      input.type = 'text';
      input.placeholder = placeholder || '';
      input.value = state.form[key];
      input.addEventListener('input', e => { state.form[key] = e.target.value; btn.disabled = !allFieldsFilled(); });
      wrap.appendChild(input);
      if(hint) wrap.appendChild(el('span','illustrative-tag', hint));
      return wrap;
    }
    function fieldDate(key, label){
      const wrap = el('div','flex flex-col gap-1');
      wrap.appendChild(el('label','text-xs font-semibold text-[var(--ink-soft)]', label));
      const input = el('input','face-input');
      input.type = 'date';
      input.value = state.form[key];
      input.addEventListener('input', e => { state.form[key] = e.target.value; btn.disabled = !allFieldsFilled(); });
      wrap.appendChild(input);
      return wrap;
    }
    function fieldSelect(key, label, options, placeholder){
      const wrap = el('div','flex flex-col gap-1');
      wrap.appendChild(el('label','text-xs font-semibold text-[var(--ink-soft)]', label));
      const select = el('select','face-input');
      select.appendChild(el('option','', placeholder));
      select.querySelector('option').value = '';
      options.forEach(o => {
        const opt = el('option','', o);
        opt.value = o;
        if(state.form[key] === o) opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', e => {
        state.form[key] = e.target.value;
        btn.disabled = !allFieldsFilled();
        renderObsBanner();
        renderCriteriaNote();
      });
      wrap.appendChild(select);
      return wrap;
    }

    return wrap;
  }

  function startAnalysis(){
    state.score = initialScoreSeed();
    state.paSubState = state.form.paStatus;
    state.screen = 'analysis';
    state.log.push({t:'PA Review', status:'in progress'});
    render();
  }

  /* ============== ANALYSIS / DECISION SHELL ============== */
  const TIMELINE_STEPS = ['PA Review','Insurance Verification','Bed Assignment','Documentation','Consent','Patient Arrival','Registration','Clinical Assessment','Admission Complete'];

  function timelineStatus(stepName){
    const pa = paEffective();
    switch(stepName){
      case 'PA Review': return pa === 'Approved' ? 'complete' : 'active';
      case 'Insurance Verification': return state.actions.insurance ? 'complete' : (pa==='Approved' ? 'active':'pending');
      case 'Bed Assignment': return state.actions.bed ? 'complete' : (state.actions.insurance ? 'active':'pending');
      case 'Documentation': return state.actions.documentation ? 'complete' : 'pending-maybe';
      case 'Consent': return state.actions.consent ? 'complete' : 'pending-maybe';
      case 'Patient Arrival': return state.actions.arrival ? 'complete' : 'pending';
      case 'Registration': return state.screen === 'decision' && currentScore() >= 90 ? 'complete' : 'pending';
      case 'Clinical Assessment': return state.screen === 'decision' && currentScore() >= 90 ? 'complete' : 'pending';
      case 'Admission Complete': return state.screen === 'decision' && currentScore() >= 90 ? 'complete' : 'pending';
      default: return 'pending';
    }
  }

  function currentScore(){
    return state.screen === 'analysis' ? state.score : computeScore();
  }

  function buildAnalysisShell(){
    const wrap = el('div','fade-in');
    const grid = el('div','grid lg:grid-cols-[230px_1fr] gap-6');

    grid.appendChild(buildSpine());

    const main = el('div','flex flex-col gap-6');
    main.appendChild(buildReadinessPanel());
    main.appendChild(buildStatusGrid());
    main.appendChild(buildPAPanel());
    main.appendChild(buildWorkflowActions());
    main.appendChild(buildRiskTracking());

    const score = currentScore();
    if(score >= 75 && state.screen !== 'decision'){
      main.appendChild(buildGovernanceSnapshot());
    }

    main.appendChild(buildCareCoordination());

    if(state.screen === 'analysis'){
      main.appendChild(buildDecisionGate());
    }
    if(state.screen === 'decision'){
      main.appendChild(buildFinalDecision());
    }

    grid.appendChild(main);
    wrap.appendChild(grid);
    return wrap;
  }

  function buildSpine(){
    const card = el('div','chart-card rounded-md p-4 h-fit lg:sticky lg:top-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','ADMISSION TIMELINE'));
    const spine = el('div','spine');
    TIMELINE_STEPS.forEach(step => {
      const status = timelineStatus(step);
      const node = el('div', 'spine-node ' + (status==='complete' ? 'complete' : status==='active' ? 'active':''));
      const dotColor = status==='complete' ? 'var(--clear)' : status==='active' ? 'var(--pend)' : 'var(--slate)';
      node.innerHTML = `<div class="text-[0.78rem] leading-snug" style="color:${status==='pending'?'var(--slate)':'var(--ink)'}; font-weight:${status==='complete'||status==='active'?600:400}">${step}</div>`;
      spine.appendChild(node);
    });
    card.appendChild(spine);
    return card;
  }

  function buildReadinessPanel(){
    const score = currentScore();
    const card = el('div','chart-card rounded-md p-6 flex flex-col sm:flex-row gap-6 items-center sm:items-start');

    // Stamp
    const stampHolder = el('div','flex-shrink-0');
    const ring = el('div','stamp-wrap');
    const armed = score >= 90;
    const denied = state.form.paStatus === 'Denied' && !state.appealSuccessful && score < 50;
    ring.innerHTML = `
      <div class="stamp-ring ${armed ? 'armed' : denied ? 'denied-tone':''}"></div>
      <div class="stamp-text" style="color:${armed?'var(--clear)':denied?'var(--deny)':'var(--slate)'}; transform:rotate(-8deg);">
        <div class="text-[1.6rem]">${armed ? 'ADMIT' : '—%'}</div>
        ${armed ? '<div class="text-[0.6rem] tracking-widest font-mono font-normal">CLEARED</div>' : ''}
      </div>`;
    stampHolder.appendChild(ring);

    const info = el('div','flex-1 w-full');
    info.appendChild(el('div','tab-label text-[var(--slate)] mb-1', state.screen==='decision' ? 'FINAL READINESS SCORE' : 'READINESS SCORE (PRELIMINARY)'));
    const scoreRow = el('div','flex items-baseline gap-3 mb-2');
    scoreRow.appendChild(el('span','font-display text-[2.6rem] leading-none', score + '%'));
    if(state.screen === 'analysis'){
      scoreRow.appendChild(el('span','text-sm text-[var(--slate)]','Decision withheld until 90% — keep working the items below.'));
    }
    info.appendChild(scoreRow);

    const bar = el('div','risk-bar-track w-full mb-3');
    const fill = el('div','risk-bar-fill');
    fill.style.width = score + '%';
    fill.style.background = score >= 90 ? 'var(--clear)' : score >= 70 ? 'var(--pend)' : 'var(--deny)';
    bar.appendChild(fill);
    info.appendChild(bar);

    const weights = el('div','grid grid-cols-3 sm:grid-cols-6 gap-2 text-center');
    const wdata = [['PA','25%'],['Documentation','20%'],['Orders','20%'],['Insurance','15%'],['Consent','10%'],['Bed','10%']];
    wdata.forEach(([label,pct])=>{
      const cell = el('div','px-1');
      cell.innerHTML = `<div class="font-mono text-[0.95rem] text-[var(--ink)] font-semibold">${pct}</div><div class="text-[0.62rem] text-[var(--slate)] uppercase tracking-wide">${label}</div>`;
      weights.appendChild(cell);
    });
    info.appendChild(weights);

    if(state.form.admissionType === 'ICU' && state.form.paStatus === 'Denied' && !state.appealSuccessful){
      const note = el('div','mt-3 text-[0.78rem] text-[var(--deny)] font-medium', '⚠ Denied PA on an ICU admission caps readiness at 69% from administrative tasks alone. Resolve the PA to clear this ceiling.');
      info.appendChild(note);
    }

    card.appendChild(stampHolder);
    card.appendChild(info);
    return card;
  }

  function buildStatusGrid(){
    const card = el('div','chart-card rounded-md p-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','INITIAL ANALYSIS · SIX-POINT STATUS'));
    const grid = el('div','grid sm:grid-cols-3 gap-3');

    const pa = paEffective();
    const items = [
      ['Prior Authorization', pa==='Approved' ? 'Approved' : pa==='Pending' ? 'Pending' : 'Denied', pa==='Approved'?'clear':pa==='Pending'?'pend':'deny'],
      ['Insurance Verification', state.actions.insurance ? 'Verified' : 'Unverified', state.actions.insurance?'clear':'pend'],
      ['Bed Assignment', state.actions.bed ? 'Assigned' : 'Unassigned', state.actions.bed?'clear':'pend'],
      ['Clinical Documentation', state.actions.documentation ? 'Complete' : 'Incomplete', state.actions.documentation?'clear':'pend'],
      ['Physician Orders', state.actions.physician ? 'Confirmed' : 'Not confirmed', state.actions.physician?'clear':'pend'],
      ['Consent', state.actions.consent ? 'Signed' : 'Not signed', state.actions.consent?'clear':'pend'],
    ];
    items.forEach(([label,val,tone])=>{
      const cell = el('div','rounded border border-[var(--rule)] p-3 bg-[#FFFDF9]');
      cell.innerHTML = `<div class="text-[0.78rem] text-[var(--ink-soft)] mb-1.5">${label}</div>
        <span class="status-chip chip-${tone}">${val}</span>`;
      grid.appendChild(cell);
    });
    card.appendChild(grid);
    return card;
  }

  function buildPAPanel(){
    const pa = state.form.paStatus;
    if(pa === 'Approved' && !needsPaPanelForDeniedHistory()) return el('div');

    const card = el('div','chart-card rounded-md p-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','PRIOR AUTHORIZATION · WORK QUEUE'));

    if(state.appealSuccessful){
      const banner = el('div','rounded px-4 py-3 mb-3 fade-in');
      banner.style.background='var(--clear-bg)';
      banner.innerHTML = `<p class="text-sm text-[var(--clear)] font-medium">✅ Appeal successful — PA status converted to Approved.</p>`;
      card.appendChild(banner);
      return card;
    }

    if(pa === 'Pending'){
      const desc = el('p','text-sm text-[var(--ink-soft)] mb-4','PA is pending payer review. Work the queue below to move it toward approval.');
      card.appendChild(desc);
      const row = el('div','grid sm:grid-cols-3 gap-3');
      row.appendChild(paActionBtn('followUp','Follow Up','Check payer portal / call queue'));
      row.appendChild(paActionBtn('uploadDocs','Upload Docs','Send clinicals supporting necessity'));
      row.appendChild(paActionBtn('contactPhysician','Contact Physician','Request additional clinical detail'));
      card.appendChild(row);
    }

    if(pa === 'Denied'){
      const desc = el('p','text-sm text-[var(--deny)] mb-4 font-medium','PA denied. Administrative progress cannot substitute for an approved authorization — work the appeal path.');
      card.appendChild(desc);
      const row = el('div','grid sm:grid-cols-3 gap-3');
      row.appendChild(paActionBtn('reviewReason','Review Reason','Read payer denial rationale'));
      row.appendChild(paActionBtn('contactInsurance','Contact Insurance','Clarify denial / request peer-to-peer'));
      row.appendChild(paActionBtn('submitAppeal','Submit Appeal', null, true));
      card.appendChild(row);
    }

    return card;

    function needsPaPanelForDeniedHistory(){ return false; }

    function paActionBtn(key, label, sub, isAppeal){
      const done = state.paActions[key];
      const btn = el('button','btn-action rounded px-4 py-3 text-sm' + (done?' done':''));
      btn.innerHTML = `<div class="flex items-center justify-between">
          <span>${label}</span>
          <span>${done ? '✓' : ''}</span>
        </div>
        ${sub ? `<div class="text-[0.72rem] text-[var(--slate)] mt-0.5">${sub}</div>` : ''}`;
      const prereqMissing = isAppeal && !(state.paActions.reviewReason && state.paActions.contactInsurance);
      btn.disabled = done || prereqMissing;
      if(prereqMissing){
        btn.title = 'Review the denial reason and contact insurance before submitting an appeal.';
      }
      btn.addEventListener('click', () => {
        state.paActions[key] = true;
        if(isAppeal){
          // appeal success is probabilistic-ish but deterministic-feeling: success if both prereqs done
          state.appealSuccessful = true;
          state.log.push({t:'PA Appeal', status:'approved on appeal'});
        }
        render();
      });
      return btn;
    }
  }

  function buildWorkflowActions(){
    const card = el('div','chart-card rounded-md p-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','WORKFLOW ACTIONS'));
    const grid = el('div','grid sm:grid-cols-3 gap-3');

    const actions = [
      ['bed','Assign Bed','Confirm unit + bed number'],
      ['insurance','Verify Insurance','Confirm eligibility & benefits'],
      ['documentation','Upload Documentation','Attach clinicals to chart'],
      ['consent','Complete Consent','Capture signed consent for treatment'],
      ['physician','Contact Physician','Confirm admission orders'],
      ['nursing','Notify Nursing','Alert receiving unit'],
      ['arrival','Prepare Patient Arrival','Stage transport & room'],
    ];

    actions.forEach(([key,label,sub])=>{
      const done = state.actions[key];
      const btn = el('button','btn-action rounded px-4 py-3 text-sm' + (done?' done':''));
      btn.innerHTML = `<div class="flex items-center justify-between"><span>${label}</span><span>${done?'✓':''}</span></div>
        <div class="text-[0.72rem] text-[var(--slate)] mt-0.5">${sub}</div>`;
      btn.disabled = done;
      btn.addEventListener('click', () => { state.actions[key] = true; render(); });
      grid.appendChild(btn);
    });

    card.appendChild(grid);
    return card;
  }

  function buildRiskTracking(){
    const score = currentScore();
    const card = el('div','chart-card rounded-md p-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','RISK TRACKING'));

    const high = isHighAcuity();
    const risks = [
      ['Documentation Risk', state.actions.documentation ? 14 : 62, false],
      ['Insurance Risk', state.actions.insurance ? 10 : 55, false],
      ['Bed Risk', state.actions.bed ? 8 : 40, false],
      ['Clinical Risk', high ? (state.actions.documentation && state.actions.physician ? 30 : 78) : (state.actions.documentation ? 18:45), high],
    ];

    const grid = el('div','grid sm:grid-cols-2 gap-4');
    risks.forEach(([label,pct,weighted])=>{
      const tone = pct >= 60 ? 'var(--deny)' : pct >= 35 ? 'var(--pend)' : 'var(--clear)';
      const cell = el('div','');
      cell.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <span class="text-[0.82rem] text-[var(--ink-soft)]">${label}${weighted?' <span class=\"font-mono text-[0.65rem] text-[var(--slate)]\">(weighted ↑)</span>':''}</span>
          <span class="font-mono text-[0.78rem]" style="color:${tone}">${pct}%</span>
        </div>
        <div class="risk-bar-track"><div class="risk-bar-fill" style="width:${pct}%; background:${tone};"></div></div>`;
      grid.appendChild(cell);
    });
    card.appendChild(grid);

    if(high){
      const note = el('div','mt-4 text-[0.78rem] text-[var(--ink-soft)] italic',
        `Clinical Risk is weighted higher for ${state.form.diagnosis === 'Acute MI' ? 'Acute MI' : state.form.diagnosis === 'CHF' ? 'CHF' : ''}${state.form.admissionType==='ICU' ? (state.form.diagnosis==='Acute MI'||state.form.diagnosis==='CHF' ? ' and ICU admissions.' : 'ICU admissions.') : ' admissions.'}`);
      card.appendChild(note);
    }
    return card;
  }

  function buildGovernanceSnapshot(){
    const card = el('div','chart-card rounded-md p-6 fade-in');
    card.style.borderLeftColor = 'var(--clear)';
    card.appendChild(el('div','tab-label text-[var(--clear)] mb-2','GOVERNANCE SNAPSHOT · UNLOCKED AT ≥75%'));
    card.appendChild(el('p','text-sm text-[var(--ink-soft)] mb-3','Industry benchmarks (estimates only) — for context, not a substitute for payer-specific terms:'));
    const grid = el('div','grid sm:grid-cols-3 gap-3');
    [['PA Turnaround','3–5 days'],['Inpatient Denial Rate','~8–10% (CMS)'],['PA Rework Cost','~$11 / transaction (CAQH)']].forEach(([k,v])=>{
      const c = el('div','rounded border border-[var(--rule)] bg-[#FFFDF9] p-3 text-center');
      c.innerHTML = `<div class="font-mono text-[1rem] text-[var(--ink)] font-semibold">${v}</div><div class="text-[0.68rem] text-[var(--slate)] mt-1 uppercase tracking-wide">${k}</div>`;
      grid.appendChild(c);
    });
    card.appendChild(grid);
    return card;
  }

  function buildCareCoordination(){
    const card = el('div','chart-card rounded-md p-6');
    card.appendChild(el('div','tab-label text-[var(--slate)] mb-3','CARE COORDINATION'));
    const grid = el('div','grid sm:grid-cols-2 lg:grid-cols-3 gap-3');

    const people = [
      ['Attending', state.form.attending || '—', 'Owns admission orders and clinical plan.'],
      ['Case Manager','M. Castellano, RN-CM (illustrative)','Coordinates LOS, payer touchpoints, discharge runway.'],
      ['Nursing', state.actions.nursing ? 'Notified' : 'Not yet notified', 'Receiving unit readiness for patient arrival.'],
      ['Utilization Review','InterQual / Milliman review (illustrative)', null],
      ['Discharge Planner','T. Whitfield, LMSW (illustrative)','Begins discharge runway planning at admission.'],
    ];

    people.forEach(([role,name,sub])=>{
      const c = el('div','rounded border border-[var(--rule)] bg-[#FFFDF9] p-4');
      c.innerHTML = `<div class="text-[0.68rem] uppercase tracking-wide text-[var(--slate)] font-mono mb-1">${role}</div>
        <div class="text-sm font-semibold text-[var(--ink)] mb-1">${name}</div>`;
      if(role === 'Utilization Review'){
        c.innerHTML += `<p class="text-[0.78rem] text-[var(--ink-soft)] leading-snug">Performs concurrent review and denial risk identification using InterQual and Milliman criteria sets to validate medical necessity before and during the stay.</p>`;
      } else if(sub){
        c.innerHTML += `<p class="text-[0.78rem] text-[var(--ink-soft)] leading-snug">${sub}</p>`;
      }
      grid.appendChild(c);
    });

    card.appendChild(grid);
    return card;
  }

  function buildDecisionGate(){
    const score = currentScore();
    const card = el('div','chart-card rounded-md p-6 flex flex-col sm:flex-row items-center justify-between gap-4');
    card.style.borderLeftColor = score >= 90 ? 'var(--clear)' : 'var(--ink)';

    const text = el('div','');
    text.innerHTML = score >= 90
      ? `<p class="text-sm font-semibold text-[var(--clear)]">Readiness has reached ${score}%. The admission record can now be finalized.</p>`
      : `<p class="text-sm text-[var(--ink-soft)]">Readiness is at <strong class="text-[var(--ink)]">${score}%</strong>. Finalize anytime — items still outstanding below 90% will be listed as remaining work, not blockers.</p>`;
    card.appendChild(text);

    const btn = el('button','btn-primary px-5 py-3 rounded text-sm whitespace-nowrap');
    btn.textContent = score >= 90 ? 'Finalize Admission Decision' : 'Run Final Decision Check';
    btn.addEventListener('click', () => { state.screen = 'decision'; render(); window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'}); });
    card.appendChild(btn);
    return card;
  }

  function buildFinalDecision(){
    const score = computeScore();
    const admit = score >= 90;
    const card = el('div','chart-card rounded-md p-6 sm:p-8 fade-in');
    card.style.borderLeftColor = admit ? 'var(--clear)' : 'var(--deny)';

    card.appendChild(el('div','tab-label mb-2', admit ? 'FINAL DECISION' : 'FINAL DECISION'));
    const headline = el('h3','font-display text-2xl mb-3', admit ? '✅ Admit — Readiness Confirmed' : '⚠ Not Ready for Admission');
    headline.style.color = admit ? 'var(--clear)' : 'var(--deny)';
    card.appendChild(headline);

    if(admit){
      card.appendChild(el('p','text-sm text-[var(--ink-soft)] mb-4', `Final readiness score: ${score}%. All weighted categories cleared threshold. Summary below for the receiving unit and chart record.`));
      const summary = el('div','grid sm:grid-cols-2 gap-4 mb-2');
      const left = el('div','rounded border border-[var(--rule)] bg-[#FFFDF9] p-4');
      left.innerHTML = `<div class="text-[0.68rem] uppercase tracking-wide text-[var(--slate)] font-mono mb-2">Admission Summary</div>
        <ul class="text-sm text-[var(--ink)] space-y-1 font-mono">
          <li>Diagnosis: ${state.form.diagnosis}</li>
          <li>Type: ${state.form.admissionType}</li>
          <li>Attending: ${state.form.attending}</li>
          <li>Provider: ${state.form.provider}</li>
          <li>Admission Date: ${state.form.admissionDate}</li>
          <li>PA Status: ${paEffective()}${state.appealSuccessful ? ' (post-appeal)' : ''}</li>
        </ul>`;
      const right = el('div','rounded border border-[var(--rule)] bg-[#FFFDF9] p-4');
      right.innerHTML = `<div class="text-[0.68rem] uppercase tracking-wide text-[var(--slate)] font-mono mb-2">Cleared Checklist</div>
        <ul class="text-sm text-[var(--clear)] space-y-1">
          <li>✓ Prior authorization resolved</li>
          <li>✓ Insurance verified</li>
          <li>✓ Bed assigned</li>
          <li>✓ Documentation complete</li>
          <li>✓ Physician orders confirmed</li>
          <li>✓ Consent signed</li>
        </ul>`;
      summary.appendChild(left); summary.appendChild(right);
      card.appendChild(summary);

      if(state.form.admissionType === 'Observation'){
        const moon = el('div','moon-banner rounded px-4 py-3 mt-4');
        moon.innerHTML = `<p class="text-[0.85rem] text-[#5C4717]"><strong>Reminder:</strong> CMS 2-Midnight Rule applies — different cost-sharing, SNF eligibility, and billing than inpatient. Confirm written MOON notification was issued for Medicare patients.</p>`;
        card.appendChild(moon);
      }
    } else {
      card.appendChild(el('p','text-sm text-[var(--ink-soft)] mb-4', `Final readiness score: ${score}% — below the 90% threshold required to admit. Missing items, required actions, and remaining risk are listed below.`));

      const missing = [];
      if(paEffective() !== 'Approved') missing.push('Prior authorization not approved.');
      if(!state.actions.insurance) missing.push('Insurance not verified.');
      if(!state.actions.bed) missing.push('Bed not assigned.');
      if(!state.actions.documentation) missing.push('Clinical documentation incomplete.');
      if(!state.actions.physician) missing.push('Physician orders not confirmed.');
      if(!state.actions.consent) missing.push('Consent not signed.');

      const actionsNeeded = [];
      if(state.form.paStatus === 'Pending' && paEffective() !== 'Approved') actionsNeeded.push('Continue PA follow-up: payer contact, supporting documentation, or physician peer-to-peer.');
      if(state.form.paStatus === 'Denied' && !state.appealSuccessful) actionsNeeded.push('Resolve denial: review reason, contact insurance, submit appeal.');
      if(!state.actions.insurance) actionsNeeded.push('Verify insurance eligibility and benefits.');
      if(!state.actions.bed) actionsNeeded.push('Assign a bed on the appropriate unit.');
      if(!state.actions.documentation) actionsNeeded.push('Upload remaining clinical documentation.');
      if(!state.actions.physician) actionsNeeded.push('Contact attending to confirm admission orders.');
      if(!state.actions.consent) actionsNeeded.push('Complete signed consent for treatment.');
      if(actionsNeeded.length === 0) actionsNeeded.push('Re-run analysis — score may be limited by acuity-weighted clinical risk rather than a single missing task.');

      const grid = el('div','grid sm:grid-cols-2 gap-4');
      const mCard = el('div','rounded border border-[var(--deny)] bg-[var(--deny-bg)] p-4');
      mCard.innerHTML = `<div class="text-[0.68rem] uppercase tracking-wide text-[var(--deny)] font-mono mb-2">Missing Items</div>
        <ul class="text-sm text-[var(--ink)] space-y-1">${missing.length ? missing.map(m=>`<li>• ${m}</li>`).join('') : '<li>None — all checklist items cleared; score limited by weighting/risk.</li>'}</ul>`;
      const aCard = el('div','rounded border border-[var(--pend)] bg-[var(--pend-bg)] p-4');
      aCard.innerHTML = `<div class="text-[0.68rem] uppercase tracking-wide text-[#8a6a1f] font-mono mb-2">Required Actions</div>
        <ul class="text-sm text-[var(--ink)] space-y-1">${actionsNeeded.map(a=>`<li>• ${a}</li>`).join('')}</ul>`;
      grid.appendChild(mCard); grid.appendChild(aCard);
      card.appendChild(grid);

      const riskNote = el('div','mt-4 text-[0.82rem] text-[var(--ink-soft)]');
      const remainingRisk = isHighAcuity() ? 'Clinical Risk remains elevated due to diagnosis/admission-type weighting — UR concurrent review should be looped in early.' : 'Remaining risk is concentrated in administrative categories — no elevated clinical weighting for this case.';
      riskNote.innerHTML = `<strong class="text-[var(--ink)]">Remaining risk:</strong> ${remainingRisk}`;
      card.appendChild(riskNote);

      const retryBtn = el('button','btn-ghost px-5 py-2.5 rounded text-sm mt-5');
      retryBtn.textContent = '← Return to workflow';
      retryBtn.addEventListener('click', () => { state.screen = 'analysis'; render(); });
      card.appendChild(retryBtn);
    }

    return card;
  }

  /* ============== INIT ============== */
  render();
})();
</script>
</body>
</html>
