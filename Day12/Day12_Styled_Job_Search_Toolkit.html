function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function renderSection(id) {
  const c = content[id];
  if (!c) return '';

  if (id === 'cover' || id === 'recruiter' || id === 'hiring' || id === 'followup') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-file-text" aria-hidden="true"></i> ${c.title} <button class="copy-btn" onclick="copyText(document.getElementById('cb-${id}').textContent, this)">Copy</button></div>
      ${c.subject ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;"><span style="font-weight:500;">Subject:</span> ${c.subject}</div>` : ''}
      <div class="content-block" id="cb-${id}">${c.body}</div>
    </div>`;
  }

  if (id === 'linkedin' || id === 'intro') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i> ${c.title} <button class="copy-btn" onclick="copyText(document.getElementById('cb-${id}').textContent, this)">Copy</button></div>
      ${c.note ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;">${c.note}</div>` : ''}
      <div class="content-block" id="cb-${id}">${c.body}</div>
      ${id === 'linkedin' ? `<div style="margin-top:8px;font-size:12px;color:var(--color-text-secondary);">Character count: <strong>${c.body.length}</strong> / 300</div>` : ''}
    </div>`;
  }

  if (id === 'referral') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-users" aria-hidden="true"></i> ${c.title} <button class="copy-btn" onclick="copyText(document.getElementById('cb-${id}').textContent, this)">Copy</button></div>
      <div class="content-block" id="cb-${id}">${c.body}</div>
    </div>`;
  }

  if (id === 'jobs') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-briefcase" aria-hidden="true"></i> ${c.title}</div>
      ${c.items.map((j, i) => `
        <div class="job-item">
          <div class="job-num">${String(i+1).padStart(2,'0')}</div>
          <div class="job-info">
            <div class="job-title">${j.title}</div>
            <div class="job-tags">
              <span class="badge ${j.match === 'Best fit' || j.match === 'Top fit' ? 'badge-purple' : j.match === 'Strong' ? 'badge-teal' : 'badge-amber'}">${j.match}</span>
              ${j.tags.map(t => `<span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary);">${t}</span>`).join('')}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  if (id === 'strengths') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-star" aria-hidden="true"></i> ${c.title}</div>
      <div class="section-label" style="margin-top:4px;">Skill proficiency</div>
      ${c.skills.map(s => `
        <div class="skill-row">
          <div class="skill-name">${s.name}</div>
          <div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${s.level}%;background:${s.color};"></div></div>
          <div style="font-size:12px;color:var(--color-text-secondary);width:30px;text-align:right;">${s.level}%</div>
        </div>`).join('')}
      <div class="section-label" style="margin-top:1.25rem;">Standout signals for recruiters</div>
      ${c.highlights.map(h => `
        <div style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);">
          <i class="ti ti-check" style="color:#0F6E56;font-size:15px;margin-top:2px;" aria-hidden="true"></i>
          <div style="font-size:13px;color:var(--color-text-primary);line-height:1.5;">${h}</div>
        </div>`).join('')}
    </div>`;
  }

  if (id === 'gaps') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> ${c.title}</div>
      <div class="grid2" style="margin-bottom:1.25rem;">
        <div class="stat-card">
          <div class="stat-label">Current strengths</div>
          ${c.current.map(s => `<div style="font-size:13px;padding:3px 0;color:var(--color-text-primary);">✓ ${s}</div>`).join('')}
        </div>
        <div class="stat-card">
          <div class="stat-label">Priority gaps</div>
          ${c.missing.map(m => `<div style="font-size:13px;padding:3px 0;color:var(--color-text-primary);">→ ${m.name}</div>`).join('')}
        </div>
      </div>
      <div class="section-label">Gap details</div>
      ${c.missing.map(m => `
        <div class="gap-item">
          <div class="gap-name">${m.name}</div>
          <div class="gap-detail">${m.detail}</div>
        </div>`).join('')}
      <div style="margin-top:1.25rem;background:#EEEDFE;border-radius:var(--border-radius-md);padding:1rem;">
        <div style="font-size:11px;font-weight:500;color:#3C3489;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Recommended learning roadmap</div>
        <div style="font-size:13px;color:#3C3489;line-height:1.7;">${c.roadmap}</div>
      </div>
    </div>`;
  }

  if (id === 'brand') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-sparkles" aria-hidden="true"></i> ${c.title}</div>
      <div class="brand-card">
        <div class="brand-label">Unique value proposition</div>
        <div class="brand-text">${c.uvp}</div>
      </div>
      <div class="brand-card">
        <div class="brand-label">Professional positioning statement</div>
        <div class="brand-text">${c.positioning}</div>
      </div>
      <div style="background:#EEEDFE;border-radius:var(--border-radius-md);padding:1rem;display:flex;align-items:flex-start;gap:10px;">
        <i class="ti ti-id-badge" style="color:#534AB7;font-size:18px;margin-top:2px;" aria-hidden="true"></i>
        <div>
          <div style="font-size:11px;font-weight:500;color:#3C3489;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">LinkedIn headline — copy & paste</div>
          <div style="font-size:13px;color:#26215C;line-height:1.6;font-weight:500;">${c.headline}</div>
          <button class="copy-btn" style="margin-top:8px;" onclick="copyText('${c.headline}', this)">Copy headline</button>
        </div>
      </div>
    </div>`;
  }

  if (id === 'talking') {
    return `<div class="card">
      <div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i> ${c.title}</div>
      ${c.items.map(t => `
        <div class="talking-pt">
          <i class="ti ${t.icon} tp-icon" aria-hidden="true"></i>
          <div class="tp-content">
            <div class="tp-label">${t.type}</div>
            <div class="tp-text">${t.text}</div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  return '';
}

const nav = document.getElementById('nav');
const sectionsEl = document.getElementById('sections');

sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<i class="ti ${s.icon}" aria-hidden="true"></i> ${s.label}`;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + s.id).classList.add('active');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section' + (i === 0 ? ' active' : '');
  div.id = 'sec-' + s.id;
  div.innerHTML = renderSection(s.id);
  sectionsEl.appendChild(div);
});
</script>
